<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meu Treino">
  <meta name="theme-color" content="#8B0000">
  <meta name="description" content="Personal Trainer App - 4 Treinos completos">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%238B0000' width='180' height='180'/><text x='90' y='90' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle'>💪</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%238B0000' width='180' height='180' rx='40'/><text x='90' y='90' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle'>💪</text></svg>">
  <title>Meu Treino - Personal Trainer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #8B0000, #B22222);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    h1 {
      color: white;
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 28px;
      }

      p {
        font-size: 14px;
      }

      .logo-link {
        font-size: 16px;
        padding: 12px 20px;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>💪 Meu Treino</h1>
    <p>Personal Trainer App<br>4 Treinos completos</p>

    <style>
      .logo-link {
        display: flex;
        align-items: center;
        gap: 12px;
        background: white;
        padding: 15px 25px;
        border-radius: 50px;
        margin-top: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        font-weight: 700;
        font-size: 18px;
        color: #333;
        text-decoration: none;
        transition: all 0.3s;
      }

      .logo-link:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      }

      .logo-link svg {
        flex-shrink: 0;
      }
    </style>

    <a href="https://adilson-redbit.github.io/personal-trainer-app/" class="logo-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="55" height="55">
        <rect fill="#FFD700" width="100" height="100" rx="12"/>
        <text x="50" y="65" font-size="75" fill="#000" text-anchor="middle" dominant-baseline="middle" font-weight="bold">💪</text>
      </svg>
      <span>Meu Treino</span>
    </a>
  </div>

</body>
</html>
