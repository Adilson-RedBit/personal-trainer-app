<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Treino - Personal Trainer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #8B0000, #B22222);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    h1 {
      color: white;
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .btn-link {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      background: white;
      color: #8B0000;
      padding: 40px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 700;
      font-size: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      min-width: 200px;
    }

    .btn-link:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
      background: #f5f5f5;
    }

    .btn-link:active {
      transform: translateY(-2px);
    }

    .emoji {
      font-size: 80px;
      display: block;
      line-height: 1;
    }

    .btn-text {
      display: block;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 28px;
      }

      p {
        font-size: 14px;
      }

      .btn-link {
        padding: 30px 25px;
        font-size: 18px;
        gap: 15px;
      }

      .emoji {
        font-size: 70px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>💪 Meu Treino</h1>
    <p>Personal Trainer App<br>4 Treinos completos</p>

    <a href="https://adilson-redbit.github.io/personal-trainer-app/" class="btn-link">
      <span class="emoji">💪</span>
      <span class="btn-text">Acessar App</span>
    </a>
  </div>

</body>
</html>
